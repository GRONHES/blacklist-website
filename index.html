<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blacklist Mobile | SPN Games</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #000; color: #fff; text-align: center; overflow: hidden; }
        
        .hero-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -2; overflow: hidden; }
        .hero-bg {
            position: absolute; top: -5%; left: -10%; width: 120%; height: 110%;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)), 
                        url('https://raw.githubusercontent.com/GRONHES/blacklist-website/main/blacklistmobilewalpaper.png'); 
            background-size: cover; background-position: center;
            animation: panEffect 25s linear infinite alternate;
        }
        @keyframes panEffect { 0% { transform: translateX(0); } 100% { transform: translateX(5%); } }

        #particles-js { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        .fire-particle {
            position: absolute; bottom: -10px;
            background: orange; box-shadow: 0 0 10px #ff4b2b, 0 0 20px #ff4b2b;
            border-radius: 50%; opacity: 0;
            animation: rise 6s infinite ease-in;
        }
        @keyframes rise {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translateY(-110vh) scale(0.5); opacity: 0; }
        }

        .content { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; z-index: 1; }
        h1 { font-size: clamp(2.5rem, 8vw, 5rem); text-transform: uppercase; letter-spacing: 8px; color: #ff4b2b; text-shadow: 0 0 30px rgba(255,75,43,0.8); font-weight: 900; }
        p { font-size: 1.3rem; color: #ddd; margin-bottom: 35px; text-shadow: 2px 2px 4px #000; }
        .cta-button { padding: 18px 55px; background: #ff4b2b; color: #fff; font-weight: bold; border-radius: 4px; text-transform: uppercase; cursor: default; box-shadow: 0 5px 25px rgba(255,75,43,0.6); }
        
        footer { position: absolute; bottom: 30px; width: 100%; z-index: 10; }
        footer a, footer span { color: #ff4b2b; text-decoration: none; margin: 0 15px; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
        .cp { display: block; margin-bottom: 10px; color: #666; font-size: 0.9rem; }

        #supportModal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; }
        .modal-content { background: #111; padding: 35px; border: 2px solid #ff4b2b; border-radius: 12px; text-align: center; max-width: 400px; box-shadow: 0 0 40px rgba(255,75,43,0.4); }
        .mail-box { background: #000; padding: 12px; border-radius: 6px; color: #fff; font-family: monospace; margin: 20px 0; border: 1px solid #444; font-size: 1.1rem; }
        .close-btn { background: #ff4b2b; color: #fff; border: none; padding: 12px 25px; cursor: pointer; border-radius: 6px; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="hero-container"><div class="hero-bg"></div></div>
    <div id="particles-js"></div>

    <section class="content">
        <h1>Blacklist Mobile</h1>
        <p>The Next Generation of Competitive Mobile FPS</p>
        <span class="cta-button">COMING SOON</span>
    </section>

    <footer>
        <span class="cp">&copy; 2026 SPN Games. All Rights Reserved.</span>
        <a href="/privacy-policy">Privacy Policy</a> 
        <span onclick="openModal()">Support</span>
    </footer>

    <div id="supportModal">
        <div class="modal-content">
            <h2 style="color:#ff4b2b">Contact Support</h2>
            <p style="margin-top:10px">Send your inquiries to:</p>
            <div class="mail-box">spngames77@gmail.com</div>
            <button class="close-btn" onclick="closeModal()">Close</button>
        </div>
    </div>

    <script>
        function initParticles() {
            const container = document.getElementById('particles-js');
            const count = 50;
            for (let i = 0; i < count; i++) {
                const p = document.createElement('div');
                p.className = 'fire-particle';
                const size = Math.random() * 4 + 2;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDuration = (Math.random() * 3 + 4) + 's';
                p.style.animationDelay = (Math.random() * 5) + 's';
                container.appendChild(p);
            }
        }
        function openModal() { document.getElementById("supportModal").style.display = "flex"; }
        function closeModal() { document.getElementById("supportModal").style.display = "none"; }
        window.onclick = function(e) { if (e.target == document.getElementById("supportModal")) closeModal(); }
        initParticles();
    </script>
</body>
</html>
