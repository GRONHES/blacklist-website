<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blacklist Mobile | SPN Games</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #0b0b0b; color: #fff; text-align: center; overflow: hidden; }
        
        .hero-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; overflow: hidden; background: #000; }
        .hero-bg {
            position: absolute; top: -5%; left: -10%; width: 120%; height: 110%;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)), 
                        url('https://raw.githubusercontent.com/GRONHES/blacklist-website/main/blacklistmobilewalpaper.png'); 
            background-size: cover; background-position: center;
            animation: panEffect 20s linear infinite alternate;
        }
        @keyframes panEffect { 0% { transform: translateX(0); } 100% { transform: translateX(5%); } }

        .content { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; z-index: 1; }
        h1 { font-size: clamp(2rem, 8vw, 4.5rem); text-transform: uppercase; letter-spacing: 8px; color: #ff4b2b; text-shadow: 0 0 20px rgba(255,75,43,0.5); margin-bottom: 10px; }
        p { font-size: 1.2rem; color: #ccc; margin-bottom: 30px; }
        .cta-button { padding: 15px 45px; background: #ff4b2b; color: #fff; font-weight: bold; border-radius: 4px; text-transform: uppercase; cursor: default; }
        
        footer { position: absolute; bottom: 30px; width: 100%; z-index: 10; }
        footer a, footer span { color: #ff4b2b; text-decoration: none; margin: 0 15px; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
        .cp { display: block; margin-bottom: 10px; color: #555; font-size: 0.9rem; }

        /* MODAL (POPUP) STİLLERİ */
        #supportModal {
            display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.9); justify-content: center; align-items: center;
        }
        .modal-content {
            background: #1a1a1a; padding: 30px; border: 1px solid #ff4b2b; border-radius: 10px; text-align: center; max-width: 400px;
        }
        .modal-content h2 { margin-bottom: 20px; color: #ff4b2b; }
        .mail-box { background: #000; padding: 10px; border-radius: 5px; color: #fff; font-family: monospace; margin-bottom: 20px; border: 1px solid #333; }
        .close-btn { background: #ff4b2b; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="hero-container"> <div class="hero-bg"></div> </div>

    <section class="content">
        <h1>Blacklist Mobile</h1>
        <p>The Next Generation of Competitive Mobile FPS</p>
        <span class="cta-button">COMING SOON</span>
    </section>

    <footer>
        <span class="cp">&copy; 2026 SPN Games. All Rights Reserved.</span>
        <a href="privacy.html">Privacy Policy</a> 
        <span onclick="openModal()">Support</span>
    </footer>

    <div id="supportModal">
        <div class="modal-content">
            <h2>Contact Support</h2>
            <p style="margin-bottom: 10px;">Please send your inquiries to:</p>
            <div class="mail-box" id="mailAddr">spngames77@gmail.com</div>
            <button class="close-btn" onclick="closeModal()">Close</button>
        </div>
    </div>

    <script>
        function openModal() { document.getElementById("supportModal").style.display = "flex"; }
        function closeModal() { document.getElementById("supportModal").style.display = "none"; }
        // Dışarı tıklayınca kapansın
        window.onclick = function(event) {
            let modal = document.getElementById("supportModal");
            if (event.target == modal) { modal.style.display = "none"; }
        }
    </script>

</body>
</html>
