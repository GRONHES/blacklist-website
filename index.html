<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blacklist Mobile | SPN Games</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #0b0b0b; color: #fff; text-align: center; overflow: hidden; }
        
        /* Hareketli Arka Plan Alanı */
        .hero-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
            background: #000;
        }

        /* RESİM BURADA HAREKET EDİYOR */
        .hero-bg {
            position: absolute;
            top: -5%;
            left: -10%;
            width: 120%; /* Resme hareket alanı açtık */
            height: 110%;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)), 
                        url('https://raw.githubusercontent.com/GRONHES/blacklist-website/main/blacklistmobilewalpaper.png'); 
            background-size: cover;
            background-position: center;
            /* 20 saniyelik çok yavaş salınım animasyonu */
            animation: panEffect 20s linear infinite alternate;
        }

        @keyframes panEffect {
            0% { transform: translateX(0); }
            100% { transform: translateX(5%); }
        }

        /* Üstteki Yazılar */
        .content {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        h1 { font-size: clamp(2rem, 8vw, 4.5rem); text-transform: uppercase; letter-spacing: 8px; color: #ff4b2b; text-shadow: 0 0 20px rgba(255,75,43,0.5); margin-bottom: 10px; }
        p { font-size: 1.2rem; color: #ccc; margin-bottom: 30px; }
        
        .cta-button { 
            padding: 15px 45px; 
            background: #ff4b2b; 
            color: #fff; 
            font-weight: bold; 
            border-radius: 4px; 
            text-transform: uppercase;
            cursor: default;
            box-shadow: 0 5px 15px rgba(255,75,43,0.4);
        }
        
        /* FOOTER VE LİNKLER */
        footer { position: absolute; bottom: 30px; width: 100%; z-index: 10; }
        footer a { color: #ff4b2b; text-decoration: none; margin: 0 15px; font-weight: bold; font-size: 1.1rem; }
        footer a:hover { color: #fff; }
        .cp { display: block; margin-bottom: 10px; color: #555; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="hero-container">
        <div class="hero-bg"></div>
    </div>

    <section class="content">
        <h1>Blacklist Mobile</h1>
        <p>The Next Generation of Competitive Mobile FPS</p>
        <span class="cta-button">COMING SOON</span>
    </section>

    <footer>
        <span class="cp">&copy; 2026 SPN Games. All Rights Reserved.</span>
        <a href="privacy.html">Privacy Policy</a> 
        <a href="mailto:spngames77@gmail.com">Support</a>
    </footer>

</body>
</html>
